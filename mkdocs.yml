site_name: AgentSpec — Deterministic Testing for AI Agents
site_description: AgentSpec enforces deterministic contracts on AI agent behavior. Test tool call ordering, argument accuracy, and chaos resilience. No vibes required.
site_url: https://agentspec.dev
repo_url: https://github.com/Anudeepsrib/AgentSpec
repo_name: Anudeepsrib/AgentSpec

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
    - Quick Start: quickstart.md
  - Guides:
    - Writing Contracts: guides/writing-contracts.md
    - Chaos Testing: guides/chaos-testing.md
    - Multi-Agent Testing: guides/multi-agent.md
    - Snapshot Testing: guides/snapshots.md
    - CI Integration: guides/ci-integration.md
    - Custom Adapters: guides/custom-adapters.md
  - API Reference:
    - ContractRunner: api/contract.md
    - AgentResult: api/result.md
    - Assertions: api/assertions.md
    - ChaosInjector: api/chaos.md
    - Storage: api/storage.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Anudeepsrib/AgentSpec
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/agentcontract/
