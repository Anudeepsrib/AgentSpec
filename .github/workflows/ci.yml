name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,all]"

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: CLI smoke tests
        run: |
          agentspec --version
          agentspec --help
          agentcontract --help
          agentspec snapshot list
          agentspec init /tmp/agentspec-init-test && rm -rf /tmp/agentspec-init-test

      - name: Compile all Python
        run: |
          python -m compileall -q agentspec agentcontract tests examples

      - name: Type check with mypy
        run: |
          mypy agentspec/ agentcontract/ || true  # non-blocking until types mature

      - name: Run tests
        run: |
          pytest tests/ -v --cov=agentspec --cov=agentcontract --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  snapshot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run contract tests
        run: |
          agentcontract run tests/ --no-persist -q || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          pip install -e ".[dev]" build
      - name: Build package
        run: |
          python -m build --wheel --sdist
      - name: Check wheel contents
        run: |
          python -c "
          import zipfile, glob
          whl = glob.glob('dist/*.whl')[0]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              print('agentspec in wheel:', any('agentspec/' in n for n in names))
              print('ui_dist in wheel:', any('ui_dist' in n for n in names))
          "

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build dashboard
        run: |
          cd dashboard
          npm ci --silent || npm install --silent
          npm run build
      - name: npm audit (non-blocking)
        run: |
          cd dashboard
          npm audit --audit-level=high || true

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs deps
        run: |
          pip install -e ".[dev,docs]" || pip install mkdocs mkdocs-material mkdocstrings[python]
      - name: Build docs
        run: |
          mkdocs build --strict || mkdocs build  # non-strict if nav issues
